<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS EXTERNO -->
     <link rel="stylesheet" href="./src/css/estilo.css">
    <title>Loja Gamer</title>

</head>
<body>

    <header>
        <h1 class="logo">LOJA<span>GAMER</span></h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Jogos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
        <div class="carrinho">
            <span  id="carrinho-contador">Itens: 0</span>
        </div>
    </header>
    <main id="container">
        <h2>Jogos em Destaques</h2>
        <section class="card">
            <div class="game-card">
                <img src="./src/assets/Imagem.jpg" alt="Mario Bros">
                <article class="card-content">
                    <h3>Mário Bros</h3>
                    <p class="preco">R$ 250,00</p>
                    <button class="btn-comprar">Comprar</button>

                </article>
            </div>
             <div class="game-card">
                <img src="./src/assets/Imagem.jpg" alt="Sonic">
                <article class="card-content">
                    <h3>Sonic</h3>
                    <p class="preco">R$ 150,00</p>
                    <button class="btn-comprar">Comprar</button>

                </article>
            </div>
             <div class="game-card">
                <img src="./src/assets/Imagem.jpg" alt="Metal Slug">
                <article class="card-content">
                    <h3>Metal Slug</h3>
                    <p class="preco">R$ 350,00</p>
                    <button class="btn-comprar">Comprar</button>

                </article>
            </div>

        </section>


    </main>
    <footer>
        <p>&copy; 2026 - Direitos Reservados</p>
    </footer>


    
</body>
</html>
